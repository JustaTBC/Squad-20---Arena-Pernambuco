<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${evento.titulo} + ' — Arena Pernambuco'">Evento — Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" integrity="sha384-/rJKQnzOkEo+daG0jMjU1IwwY9unxt1NBw3Ef2fmOJ3PW/TfAg2KXVoWwMZQZtw9" crossorigin="anonymous"/>
  <style>
    .detalhe-hero {
      position: relative;
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem 2.5rem;
      margin-bottom: 2rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background-color: var(--bg-card);
    }
    .detalhe-hero__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .detalhe-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 10, 15, 0.3) 0%, rgba(10, 10, 15, 0.85) 100%);
      pointer-events: none;
    }
    .detalhe-hero > * {
      position: relative;
      z-index: 1;
    }
    .detalhe-hero h1 {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .detalhe-content {
      max-width: 800px;
    }
    .detalhe-content p {
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .detalhe-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .detalhe-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main>
  <section class="detalhe-hero" data-aos="fade-in">
    <img th:if="${not #strings.isEmpty(evento.imagemUrl)}" class="detalhe-hero__bg" th:src="${evento.imagemUrl}" th:alt="${evento.titulo}" loading="lazy"/>
    <div class="detalhe-meta">
      <span class="badge" th:text="${evento.categoria}" th:style="'background-color:' + ${evento.badgeCor} + '1a; color:' + ${evento.badgeCor}">Categoria</span>
      <span class="text-muted" th:text="${evento.dataFormatada}">01/01/2026</span>
    </div>
    <h1 th:text="${evento.titulo}">Título do Evento</h1>
  </section>

  <section class="detalhe-content" data-aos="fade-up" data-aos-delay="100">
    <h2>Sobre o evento</h2>
    <p th:text="${evento.descricaoCompleta}">Descrição completa do evento.</p>

    <div th:if="${sucesso}" class="flash-msg flash-msg--sucesso" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="flash-msg flash-msg--erro" th:text="${erro}"></div>

    <div class="detalhe-actions">
      <!-- Participante/Admin: form de compra -->
      <div sec:authorize="hasAnyRole('PARTICIPANTE','ADMIN')" class="compra-form">
        <form th:action="@{/ingressos/comprar}" method="post">
          <input type="hidden" name="eventoId" th:value="${evento.id}"/>
          <div class="compra-form__qty">
            <label for="quantidade">Ingressos</label>
            <input type="number" id="quantidade" name="quantidade"
                   value="1" min="1" max="5"/>
          </div>
          <button type="submit" class="btn btn--primary">Comprar Ingresso</button>
        </form>
      </div>

      <!-- Visitante: link para login -->
      <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn--primary">
        Entrar para comprar
      </a>

      <a th:href="@{/verificar}" sec:authorize="hasAnyRole('PARTICIPANTE','ADMIN')"
         class="btn btn--ghost">Verificar ingresso</a>
      <a th:href="@{/eventos}" class="btn btn--ghost">Voltar aos eventos</a>
    </div>
  </section>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js" integrity="sha384-wziAfh6b/qT+3LrqebF9WeK4+J5sehS6FA10J1t3a866kJ/fvU5UwofWnQyzLtwu" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha384-d+vyQ0dYcymoP8ndq2hW7FGC50nqGdXUEgoOUGxbbkAJwZqL7h+jKN0GGgn9hFDS" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lenis@1/dist/lenis.min.js" integrity="sha384-iiCtod6ZId6zT42Bar9EFXNKZh8X4VliWYWFOuY3/t1AxCvLejXExXcbluoc57CJ" crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
