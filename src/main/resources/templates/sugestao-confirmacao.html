<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sugestão Recebida | Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="container" style="padding: 4rem 1rem; text-align: center; max-width: 600px;">
  <h1 class="section-title">Sugestão Recebida!</h1>
  <p style="margin-bottom: 2rem;">
    Obrigado por contribuir. Sua sugestão foi registrada e será analisada pela nossa equipe.
  </p>
  <div style="display:flex; gap:1rem; justify-content:center;">
    <a th:href="@{/sugestoes}" class="btn btn--ghost">Nova Sugestão</a>
    <a th:href="@{/eventos}" class="btn btn--primary">Ver Eventos</a>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
